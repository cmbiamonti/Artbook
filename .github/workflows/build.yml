name: Build ArtBook — Multi Platform

# ── Opt-in a Node.js 24 ora (prima che diventi obbligatorio) ─────────────────
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Piattaforma da compilare'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - mac
          - windows
          - linux

permissions:
  contents: write

jobs:

  # ════════════════════════════════════════════════════════
  # BUILD macOS
  # ════════════════════════════════════════════════════════
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'mac'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4        # versione più recente — supporta Node 24

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4      # versione più recente — supporta Node 24
        with:
          node-version: '22'             # Node 22 LTS — stabile e supportato da Electron
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Generate macOS icon (.icns)
        run: |
          mkdir -p /tmp/artbook.iconset

          sips -z 16   16   build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_16x16.png
          sips -z 32   32   build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_16x16@2x.png
          sips -z 32   32   build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_32x32.png
          sips -z 64   64   build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_32x32@2x.png
          sips -z 128  128  build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_128x128.png
          sips -z 256  256  build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_128x128@2x.png
          sips -z 256  256  build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_256x256.png
          sips -z 512  512  build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_256x256@2x.png
          sips -z 512  512  build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_512x512.png
          sips -z 1024 1024 build/icons/icon.png \
            --out /tmp/artbook.iconset/icon_512x512@2x.png

          iconutil -c icns /tmp/artbook.iconset \
            -o build/icons/icon.icns

          echo "✅ icon.icns generato"
          ls -la build/icons/

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Electron TypeScript
        run: npx tsc -p tsconfig.electron.json
        continue-on-error: true

      - name: Package macOS .dmg
        run: |
          npx electron-builder --mac \
            --x64 \
            --arm64 \
            --publish never
        env:
          GH_TOKEN:                      ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY:   false

      - name: List release files
        run: ls -la release/

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4   # versione più recente
        with:
          name:            ArtBook-macOS
          retention-days:  30
          path: |
            release/*.dmg
            release/*.zip
            release/*.blockmap

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
          name:       ArtBook ${{ github.ref_name }}
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════
  # BUILD WINDOWS
  # ════════════════════════════════════════════════════════
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'windows'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Electron TypeScript
        run: npx tsc -p tsconfig.electron.json
        continue-on-error: true

      - name: Package Windows .exe
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release files
        run: dir release\

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name:            ArtBook-Windows
          retention-days:  30
          path: |
            release/*.exe
            release/*.blockmap

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════════
  # BUILD LINUX
  # ════════════════════════════════════════════════════════
  build-linux:
    name: Build Linux (.AppImage)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'linux'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 22 LTS
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build

      - name: Build Electron TypeScript
        run: npx tsc -p tsconfig.electron.json
        continue-on-error: true

      - name: Package Linux
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name:            ArtBook-Linux
          retention-days:  30
          path: |
            release/*.AppImage
            release/*.deb

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}