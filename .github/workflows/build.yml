name: Build ArtBook — Multi Platform

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      platform:
        description: 'Piattaforma da compilare'
        required: true
        default: 'mac'
        type: choice
        options:
          - all
          - mac
          - windows
          - linux

permissions:
  contents: write

jobs:

  # ════════════════════════════════════════════════════
  # BUILD macOS
  # ════════════════════════════════════════════════════
  build-mac:
    name: Build macOS (.dmg)
    runs-on: macos-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'mac'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      # Node.js 24 — risolve il warning deprecation
      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      # Installa dipendenze — usa package-lock.json esatto
      - name: Install dependencies
        run: npm ci

      # Verifica che electron sia installato
      - name: Verify electron installation
        run: |
          echo "Node version: $(node --version)"
          echo "NPM version:  $(npm --version)"
          echo "Electron:     $(npx electron --version 2>/dev/null || echo 'not found')"
          ls node_modules | grep electron || echo "electron not in node_modules"

      # Genera icon.icns dal PNG
      - name: Generate macOS icon (.icns)
        run: |
          if [ ! -f "build/icons/icon.png" ]; then
            echo "⚠️ build/icons/icon.png non trovato — creo icona placeholder"
            mkdir -p build/icons
            # Crea un PNG placeholder 1024x1024 con sips
            python3 -c "
          import struct, zlib

          def create_png(w, h, color=(107,45,62)):
              def chunk(name, data):
                  c = zlib.crc32(name + data) & 0xffffffff
                  return struct.pack('>I', len(data)) + name + data + struct.pack('>I', c)
              ihdr = struct.pack('>IIBBBBB', w, h, 8, 2, 0, 0, 0)
              raw = b''.join(b'\x00' + bytes(color)*w for _ in range(h))
              idat = zlib.compress(raw)
              return b'\x89PNG\r\n\x1a\n' + chunk(b'IHDR',ihdr) + chunk(b'IDAT',idat) + chunk(b'IEND',b'')

          open('build/icons/icon.png','wb').write(create_png(1024,1024))
          print('Placeholder PNG creato')
          "
          fi

          mkdir -p /tmp/artbook.iconset
          for size in 16 32 64 128 256 512 1024; do
            sips -z $size $size build/icons/icon.png \
              --out /tmp/artbook.iconset/icon_${size}x${size}.png \
              2>/dev/null
          done

          # Copia le versioni @2x
          cp /tmp/artbook.iconset/icon_32x32.png   /tmp/artbook.iconset/icon_16x16@2x.png
          cp /tmp/artbook.iconset/icon_64x64.png   /tmp/artbook.iconset/icon_32x32@2x.png
          cp /tmp/artbook.iconset/icon_256x256.png /tmp/artbook.iconset/icon_128x128@2x.png
          cp /tmp/artbook.iconset/icon_512x512.png /tmp/artbook.iconset/icon_256x256@2x.png
          cp /tmp/artbook.iconset/icon_1024x1024.png /tmp/artbook.iconset/icon_512x512@2x.png

          iconutil -c icns /tmp/artbook.iconset -o build/icons/icon.icns
          echo "✅ icon.icns generato"
          ls -la build/icons/

      # Build frontend React+Vite
      - name: Build frontend (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      # Compila TypeScript Electron
      - name: Build Electron TypeScript
        run: npx tsc -p tsconfig.electron.json
        continue-on-error: true

      # Verifica che dist/ e dist-electron/ esistano
      - name: Verify build output
        run: |
          echo "=== dist/ ==="
          ls -la dist/ 2>/dev/null || echo "MANCANTE: dist/"
          echo "=== dist-electron/ ==="
          ls -la dist-electron/ 2>/dev/null || echo "MANCANTE: dist-electron/"

      # Crea il .dmg
      - name: Package macOS .dmg
        run: |
          npx electron-builder \
            --mac \
            --x64 \
            --arm64 \
            --publish never
        env:
          GH_TOKEN:                    ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          # Forza electron-builder a usare l'electron locale
          ELECTRON_BUILDER_ALLOW_UNRESOLVED_DEPENDENCIES: true

      # Mostra i file prodotti
      - name: List release output
        run: |
          echo "=== release/ ==="
          ls -la release/ 2>/dev/null || echo "Cartella release/ vuota o assente"

      # Carica come artifact scaricabile
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name:           ArtBook-macOS
          retention-days: 30
          path: |
            release/*.dmg
            release/*.zip

      # Pubblica nella Release GitHub (solo su tag)
      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.dmg
            release/*.zip
          name:       ArtBook ${{ github.ref_name }}
          draft:      false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════
  # BUILD WINDOWS
  # ════════════════════════════════════════════════════
  build-windows:
    name: Build Windows (.exe)
    runs-on: windows-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'windows'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify electron installation
        run: |
          node --version
          npm --version
          npx electron --version

      - name: Build frontend (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build Electron TypeScript
        run: npx tsc -p tsconfig.electron.json
        continue-on-error: true

      - name: Package Windows .exe
        run: npx electron-builder --win --x64 --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release output
        run: dir release\ 2>nul || echo "Cartella release vuota"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name:           ArtBook-Windows
          retention-days: 30
          path: release/*.exe

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release/*.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ════════════════════════════════════════════════════
  # BUILD LINUX
  # ════════════════════════════════════════════════════
  build-linux:
    name: Build Linux (.AppImage)
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      github.event.inputs.platform == 'all' ||
      github.event.inputs.platform == 'linux'

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.0-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend (Vite)
        run: npm run build
        env:
          NODE_ENV: production

      - name: Build Electron TypeScript
        run: npx tsc -p tsconfig.electron.json
        continue-on-error: true

      - name: Package Linux
        run: npx electron-builder --linux --publish never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name:           ArtBook-Linux
          retention-days: 30
          path: |
            release/*.AppImage
            release/*.deb

      - name: Publish to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release/*.AppImage
            release/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}